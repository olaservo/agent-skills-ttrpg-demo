<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#efe2c4"/>
  <!-- Crest plume (gold) -->
  <rect x="11" y="1" width="2" height="2" fill="#9a6b1f"/>
  <!-- Knight's helm (steel = dim) -->
  <rect x="9" y="3" width="6" height="1" fill="#7a6242"/>
  <rect x="8" y="4" width="8" height="5" fill="#7a6242"/>
  <!-- Visor slit -->
  <rect x="8" y="6" width="8" height="1" fill="#3a2a18"/>
  <!-- Breath holes -->
  <rect x="10" y="8" width="1" height="2" fill="#3a2a18"/>
  <rect x="13" y="8" width="1" height="2" fill="#3a2a18"/>
  <rect x="9" y="9" width="6" height="2" fill="#7a6242"/>
  <!-- Gorget -->
  <rect x="8" y="11" width="8" height="1" fill="#3a2a18"/>
  <!-- Pauldrons + breastplate -->
  <rect x="5" y="13" width="14" height="1" fill="#7a6242"/>
  <rect x="4" y="14" width="16" height="10" fill="#7a6242"/>
  <!-- Heraldic cross (gold) -->
  <rect x="11" y="16" width="2" height="6" fill="#9a6b1f"/>
  <rect x="9" y="18" width="6" height="2" fill="#9a6b1f"/>
</svg>
