<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#efe2c4"/>
  <!-- Wild mane (ink), spiked -->
  <rect x="9" y="1" width="1" height="2" fill="#3a2a18"/>
  <rect x="11" y="0" width="2" height="3" fill="#3a2a18"/>
  <rect x="14" y="1" width="1" height="2" fill="#3a2a18"/>
  <rect x="7" y="3" width="10" height="2" fill="#3a2a18"/>
  <rect x="6" y="5" width="2" height="6" fill="#3a2a18"/>
  <rect x="16" y="5" width="2" height="6" fill="#3a2a18"/>
  <!-- Face (orc, dim) -->
  <rect x="8" y="5" width="8" height="7" fill="#7a6242"/>
  <!-- Heavy brow -->
  <rect x="8" y="6" width="8" height="1" fill="#3a2a18"/>
  <!-- Fierce eyes (red) -->
  <rect x="9" y="7" width="2" height="1" fill="#8e2f2a"/>
  <rect x="13" y="7" width="2" height="1" fill="#8e2f2a"/>
  <!-- Snarling mouth -->
  <rect x="9" y="10" width="6" height="1" fill="#3a2a18"/>
  <!-- Tusks (parchment, jutting up) -->
  <rect x="9" y="9" width="1" height="1" fill="#efe2c4"/>
  <rect x="14" y="9" width="1" height="1" fill="#efe2c4"/>
  <!-- Hulking shoulders -->
  <rect x="4" y="12" width="16" height="1" fill="#3a2a18"/>
  <rect x="3" y="13" width="18" height="11" fill="#7a6242"/>
  <!-- War paint / scar (red) -->
  <rect x="6" y="14" width="1" height="6" fill="#8e2f2a"/>
</svg>
