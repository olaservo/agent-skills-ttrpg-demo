<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#efe2c4"/>
  <!-- Halo / nimbus (gold) -->
  <rect x="9" y="1" width="6" height="1" fill="#c9952f"/>
  <rect x="8" y="2" width="1" height="1" fill="#c9952f"/>
  <rect x="15" y="2" width="1" height="1" fill="#c9952f"/>
  <!-- Veil / wimple (dim) -->
  <rect x="8" y="3" width="8" height="1" fill="#7a6242"/>
  <rect x="7" y="4" width="2" height="8" fill="#7a6242"/>
  <rect x="15" y="4" width="2" height="8" fill="#7a6242"/>
  <rect x="8" y="4" width="8" height="1" fill="#7a6242"/>
  <!-- Face -->
  <rect x="9" y="5" width="6" height="6" fill="#e3d2ab"/>
  <!-- Calm eyes -->
  <rect x="10" y="7" width="1" height="1" fill="#3a2a18"/>
  <rect x="13" y="7" width="1" height="1" fill="#3a2a18"/>
  <!-- Mouth -->
  <rect x="11" y="9" width="2" height="1" fill="#7a6242"/>
  <!-- Robes -->
  <rect x="8" y="12" width="8" height="1" fill="#7a6242"/>
  <rect x="6" y="13" width="12" height="11" fill="#e3d2ab"/>
  <!-- Holy symbol (gold cross) on chest -->
  <rect x="11" y="15" width="2" height="6" fill="#9a6b1f"/>
  <rect x="9" y="17" width="6" height="2" fill="#9a6b1f"/>
  <!-- Sword hilt at side (spellblade) -->
  <rect x="4" y="16" width="2" height="1" fill="#7a6242"/>
  <rect x="4" y="17" width="1" height="6" fill="#7a6242"/>
</svg>
