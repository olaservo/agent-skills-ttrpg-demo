<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#efe2c4"/>
  <!-- Arcane spark above brow (violet) -->
  <rect x="11" y="1" width="2" height="1" fill="#5a3b8c"/>
  <rect x="11" y="2" width="2" height="1" fill="#9a6b1f"/>
  <!-- Long elf hair (dim) -->
  <rect x="7" y="3" width="10" height="1" fill="#7a6242"/>
  <rect x="6" y="4" width="2" height="9" fill="#7a6242"/>
  <rect x="16" y="4" width="2" height="9" fill="#7a6242"/>
  <rect x="8" y="4" width="8" height="2" fill="#7a6242"/>
  <!-- Face -->
  <rect x="8" y="6" width="8" height="5" fill="#efe2c4"/>
  <rect x="9" y="5" width="6" height="6" fill="#e3d2ab"/>
  <!-- Pointed ears -->
  <rect x="6" y="7" width="1" height="1" fill="#e3d2ab"/>
  <rect x="5" y="8" width="1" height="1" fill="#e3d2ab"/>
  <rect x="17" y="7" width="1" height="1" fill="#e3d2ab"/>
  <rect x="18" y="8" width="1" height="1" fill="#e3d2ab"/>
  <!-- Eyes (violet glow) -->
  <rect x="10" y="8" width="1" height="1" fill="#5a3b8c"/>
  <rect x="13" y="8" width="1" height="1" fill="#5a3b8c"/>
  <!-- Mouth -->
  <rect x="11" y="10" width="2" height="1" fill="#7a6242"/>
  <!-- Robe (violet) -->
  <rect x="8" y="12" width="8" height="1" fill="#7a6242"/>
  <rect x="6" y="13" width="12" height="11" fill="#5a3b8c"/>
  <!-- Robe trim (gold) -->
  <rect x="11" y="13" width="2" height="11" fill="#9a6b1f"/>
</svg>
