<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#0d1f0d"/>
  <!-- Massive bald skull (low brow, oversized) -->
  <rect x="6" y="2" width="12" height="1" fill="#4a9c63"/>
  <rect x="5" y="3" width="14" height="1" fill="#4a9c63"/>
  <rect x="5" y="4" width="14" height="1" fill="#7cffa0"/>
  <rect x="5" y="5" width="14" height="1" fill="#7cffa0"/>
  <!-- Heavy brow ridge -->
  <rect x="5" y="6" width="14" height="1" fill="#4a9c63"/>
  <!-- Eyes (small, deep-set, glowing yellow under heavy brow) -->
  <rect x="7" y="6" width="2" height="1" fill="#ffe45e"/>
  <rect x="15" y="6" width="2" height="1" fill="#ffe45e"/>
  <!-- Face below brow -->
  <rect x="6" y="7" width="12" height="1" fill="#7cffa0"/>
  <rect x="6" y="8" width="12" height="1" fill="#7cffa0"/>
  <rect x="6" y="9" width="12" height="1" fill="#7cffa0"/>
  <rect x="6" y="10" width="12" height="1" fill="#7cffa0"/>
  <!-- Heavy jaw / underbite tusks -->
  <rect x="7" y="11" width="10" height="1" fill="#7cffa0"/>
  <rect x="8" y="12" width="2" height="1" fill="#7cffa0"/>
  <rect x="14" y="12" width="2" height="1" fill="#7cffa0"/>
  <!-- Tusks (dim, jutting up from lower jaw into face) -->
  <rect x="9" y="10" width="1" height="1" fill="#4a9c63"/>
  <rect x="14" y="10" width="1" height="1" fill="#4a9c63"/>
  <!-- Scarred cheek (yellow streak) -->
  <rect x="6" y="9" width="1" height="2" fill="#ffe45e"/>
  <!-- Mouth -->
  <rect x="10" y="10" width="4" height="1" fill="#0d1f0d"/>
  <!-- Wide neck (dim) -->
  <rect x="8" y="13" width="8" height="2" fill="#4a9c63"/>
  <!-- Massive shoulders filling frame -->
  <rect x="0" y="15" width="24" height="9" fill="#4a9c63"/>
  <!-- Tribal/leather strap diagonal across chest (yellow) -->
  <rect x="6" y="16" width="2" height="1" fill="#ffe45e"/>
  <rect x="8" y="17" width="2" height="1" fill="#ffe45e"/>
  <rect x="10" y="18" width="2" height="1" fill="#ffe45e"/>
  <rect x="12" y="19" width="2" height="1" fill="#ffe45e"/>
  <rect x="14" y="20" width="2" height="1" fill="#ffe45e"/>
</svg>
