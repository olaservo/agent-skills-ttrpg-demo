<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Pip-Boy 3000 — Character</title>
</head>
<body>
  <main class="pipboy" id="pipboy">
    <header class="crt-header">
      <span class="vault-tec">PIP-BOY 3000 — CHARACTER</span>
      <span class="status" id="status">STANDBY</span>
    </header>

    <section class="hud" id="hud" hidden>
      <div class="hud-name">
        <h1 class="hud-title" id="char-name">—</h1>
        <p class="hud-sub">
          <span id="char-origin">—</span>
          <span class="sep">·</span>
          LVL <span id="char-level">—</span>
          <span class="sep">·</span>
          LCK <span id="char-luck">—</span>
          <span class="sep">·</span>
          HP <span id="char-hp">—</span>
        </p>
      </div>
      <ul class="special" id="char-special">
        <li><b>S</b><span data-stat="str">—</span></li>
        <li><b>P</b><span data-stat="per">—</span></li>
        <li><b>E</b><span data-stat="end">—</span></li>
        <li><b>C</b><span data-stat="cha">—</span></li>
        <li><b>I</b><span data-stat="int">—</span></li>
        <li><b>A</b><span data-stat="agi">—</span></li>
        <li><b>L</b><span data-stat="luk">—</span></li>
      </ul>
    </section>

    <section class="body" id="body" hidden>
      <img class="portrait" id="portrait" alt="" />
      <article class="sheet-md" id="sheet-md"></article>
    </section>

    <section class="empty" id="empty">
      <p>No character loaded. Ask the agent to <code>show_character_sheet</code>.</p>
    </section>
  </main>

  <script type="module" src="/src/character-app.ts"></script>
</body>
</html>
