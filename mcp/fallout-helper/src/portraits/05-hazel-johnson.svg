<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#0d1f0d"/>
  <!-- Brotherhood field cap (peaked cap, dim) -->
  <rect x="8" y="2" width="8" height="1" fill="#4a9c63"/>
  <rect x="7" y="3" width="10" height="2" fill="#4a9c63"/>
  <!-- Cap brim -->
  <rect x="6" y="5" width="12" height="1" fill="#4a9c63"/>
  <!-- Yellow chevron on cap -->
  <rect x="11" y="3" width="2" height="1" fill="#ffe45e"/>
  <rect x="10" y="4" width="1" height="1" fill="#ffe45e"/>
  <rect x="13" y="4" width="1" height="1" fill="#ffe45e"/>
  <!-- Face -->
  <rect x="8" y="6" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="7" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="8" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="9" width="8" height="1" fill="#7cffa0"/>
  <rect x="9" y="10" width="6" height="1" fill="#7cffa0"/>
  <rect x="9" y="11" width="6" height="1" fill="#7cffa0"/>
  <!-- Eyes (focused, narrow) -->
  <rect x="10" y="8" width="1" height="1" fill="#0d1f0d"/>
  <rect x="13" y="8" width="1" height="1" fill="#0d1f0d"/>
  <!-- Set jaw / serious mouth -->
  <rect x="11" y="10" width="2" height="1" fill="#0d1f0d"/>
  <!-- Neck -->
  <rect x="11" y="12" width="2" height="1" fill="#7cffa0"/>
  <!-- Field uniform shoulders -->
  <rect x="5" y="13" width="14" height="2" fill="#4a9c63"/>
  <rect x="4" y="15" width="16" height="9" fill="#4a9c63"/>
  <!-- Shoulder armor pads (bright accents) -->
  <rect x="4" y="14" width="3" height="2" fill="#7cffa0"/>
  <rect x="17" y="14" width="3" height="2" fill="#7cffa0"/>
  <!-- Brotherhood gear strap (yellow stitching) -->
  <rect x="6" y="17" width="12" height="1" fill="#ffe45e"/>
  <!-- Med kit pouch with red + cross -->
  <rect x="14" y="19" width="3" height="3" fill="#7cffa0"/>
  <rect x="14" y="20" width="3" height="1" fill="#ffe45e"/>
  <rect x="15" y="19" width="1" height="3" fill="#ffe45e"/>
</svg>
