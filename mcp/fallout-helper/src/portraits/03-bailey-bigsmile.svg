<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#0d1f0d"/>
  <!-- Irregular ghoul skull (no smooth top) -->
  <rect x="9" y="3" width="2" height="1" fill="#4a9c63"/>
  <rect x="13" y="3" width="3" height="1" fill="#4a9c63"/>
  <rect x="8" y="4" width="8" height="1" fill="#4a9c63"/>
  <rect x="7" y="5" width="10" height="1" fill="#4a9c63"/>
  <!-- Patchy scalp (necrotic spots) -->
  <rect x="10" y="3" width="1" height="1" fill="#0d1f0d"/>
  <rect x="12" y="4" width="1" height="1" fill="#0d1f0d"/>
  <!-- Face base -->
  <rect x="7" y="6" width="10" height="6" fill="#7cffa0"/>
  <!-- Sunken cheeks (dim patches) -->
  <rect x="7" y="7" width="1" height="2" fill="#4a9c63"/>
  <rect x="16" y="7" width="1" height="2" fill="#4a9c63"/>
  <rect x="8" y="9" width="1" height="1" fill="#4a9c63"/>
  <rect x="15" y="9" width="1" height="1" fill="#4a9c63"/>
  <!-- Hollow eyes (large, dark, ringed) -->
  <rect x="9" y="7" width="2" height="2" fill="#0d1f0d"/>
  <rect x="13" y="7" width="2" height="2" fill="#0d1f0d"/>
  <rect x="9" y="9" width="2" height="1" fill="#4a9c63"/>
  <rect x="13" y="9" width="2" height="1" fill="#4a9c63"/>
  <!-- No nose - just a vertical scar -->
  <rect x="11" y="8" width="1" height="2" fill="#4a9c63"/>
  <!-- Wide rictus grin showing teeth -->
  <rect x="8" y="10" width="8" height="2" fill="#0d1f0d"/>
  <rect x="9" y="11" width="1" height="1" fill="#7cffa0"/>
  <rect x="11" y="11" width="1" height="1" fill="#7cffa0"/>
  <rect x="13" y="11" width="1" height="1" fill="#7cffa0"/>
  <rect x="15" y="11" width="0" height="0" fill="#7cffa0"/>
  <rect x="14" y="11" width="1" height="1" fill="#7cffa0"/>
  <!-- Neck -->
  <rect x="10" y="12" width="4" height="1" fill="#7cffa0"/>
  <!-- Ragged cloak (dim, jagged top) -->
  <rect x="5" y="14" width="14" height="10" fill="#4a9c63"/>
  <rect x="6" y="13" width="2" height="1" fill="#4a9c63"/>
  <rect x="9" y="13" width="3" height="1" fill="#4a9c63"/>
  <rect x="13" y="13" width="2" height="1" fill="#4a9c63"/>
  <rect x="16" y="13" width="2" height="1" fill="#4a9c63"/>
  <!-- Tear/hole in cloak -->
  <rect x="11" y="18" width="2" height="1" fill="#0d1f0d"/>
  <rect x="14" y="20" width="1" height="1" fill="#0d1f0d"/>
</svg>
