<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#0d1f0d"/>
  <!-- Mister Handy spheroid body -->
  <rect x="9" y="3" width="6" height="1" fill="#4a9c63"/>
  <rect x="8" y="4" width="8" height="1" fill="#4a9c63"/>
  <rect x="7" y="5" width="10" height="1" fill="#4a9c63"/>
  <rect x="6" y="6" width="12" height="6" fill="#4a9c63"/>
  <rect x="7" y="12" width="10" height="1" fill="#4a9c63"/>
  <rect x="8" y="13" width="8" height="1" fill="#4a9c63"/>
  <rect x="9" y="14" width="6" height="1" fill="#4a9c63"/>
  <!-- Body highlight (bright sphere) -->
  <rect x="8" y="6" width="3" height="2" fill="#7cffa0"/>
  <!-- Three optic eye-stalks (yellow lenses on bright stalks) -->
  <rect x="8" y="2" width="1" height="3" fill="#7cffa0"/>
  <rect x="11" y="1" width="1" height="3" fill="#7cffa0"/>
  <rect x="14" y="2" width="1" height="3" fill="#7cffa0"/>
  <rect x="7" y="1" width="3" height="1" fill="#ffe45e"/>
  <rect x="10" y="0" width="3" height="1" fill="#ffe45e"/>
  <rect x="13" y="1" width="3" height="1" fill="#ffe45e"/>
  <!-- Three arm stubs (extending out from sphere) -->
  <rect x="2" y="9" width="4" height="1" fill="#4a9c63"/>
  <rect x="0" y="10" width="6" height="1" fill="#7cffa0"/>
  <rect x="2" y="11" width="4" height="1" fill="#4a9c63"/>
  <!-- Right arm (buzz-saw, circular hint) -->
  <rect x="18" y="9" width="4" height="1" fill="#4a9c63"/>
  <rect x="18" y="10" width="6" height="1" fill="#7cffa0"/>
  <rect x="22" y="9" width="2" height="3" fill="#ffe45e"/>
  <rect x="18" y="11" width="4" height="1" fill="#4a9c63"/>
  <!-- Bottom arm hint (pincer) -->
  <rect x="11" y="15" width="2" height="2" fill="#7cffa0"/>
  <rect x="10" y="16" width="1" height="1" fill="#7cffa0"/>
  <rect x="13" y="16" width="1" height="1" fill="#7cffa0"/>
  <!-- Thruster (jet propulsion flame in yellow) -->
  <rect x="11" y="18" width="2" height="1" fill="#4a9c63"/>
  <rect x="10" y="19" width="4" height="1" fill="#ffe45e"/>
  <rect x="11" y="20" width="2" height="1" fill="#ffe45e"/>
  <rect x="10" y="21" width="1" height="1" fill="#ffe45e"/>
  <rect x="13" y="21" width="1" height="1" fill="#ffe45e"/>
  <rect x="11" y="22" width="2" height="1" fill="#7cffa0"/>
</svg>
