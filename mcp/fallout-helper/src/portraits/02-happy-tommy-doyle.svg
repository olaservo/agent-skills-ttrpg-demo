<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <rect width="24" height="24" fill="#0d1f0d"/>
  <!-- Fedora top -->
  <rect x="8" y="1" width="8" height="1" fill="#4a9c63"/>
  <rect x="7" y="2" width="10" height="2" fill="#4a9c63"/>
  <!-- Fedora band (yellow) -->
  <rect x="7" y="4" width="10" height="1" fill="#ffe45e"/>
  <!-- Fedora brim -->
  <rect x="5" y="5" width="14" height="1" fill="#4a9c63"/>
  <!-- Face -->
  <rect x="8" y="6" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="7" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="8" width="8" height="1" fill="#7cffa0"/>
  <rect x="8" y="9" width="8" height="1" fill="#7cffa0"/>
  <rect x="9" y="10" width="6" height="1" fill="#7cffa0"/>
  <rect x="9" y="11" width="6" height="1" fill="#7cffa0"/>
  <!-- Eyes -->
  <rect x="10" y="8" width="1" height="1" fill="#0d1f0d"/>
  <rect x="13" y="8" width="1" height="1" fill="#0d1f0d"/>
  <!-- Smug grin -->
  <rect x="10" y="10" width="4" height="1" fill="#0d1f0d"/>
  <rect x="11" y="11" width="1" height="1" fill="#7cffa0"/>
  <!-- Gold tooth -->
  <rect x="12" y="11" width="1" height="1" fill="#ffe45e"/>
  <!-- Neck -->
  <rect x="11" y="12" width="2" height="1" fill="#7cffa0"/>
  <!-- Coat collar (dim green) -->
  <rect x="6" y="13" width="3" height="3" fill="#4a9c63"/>
  <rect x="15" y="13" width="3" height="3" fill="#4a9c63"/>
  <!-- Coat body -->
  <rect x="5" y="14" width="14" height="10" fill="#4a9c63"/>
  <!-- Open shirt V (bright) -->
  <rect x="11" y="13" width="2" height="2" fill="#7cffa0"/>
  <rect x="11" y="15" width="2" height="1" fill="#7cffa0"/>
  <!-- Tie / lapel accent (yellow) -->
  <rect x="11" y="16" width="2" height="1" fill="#ffe45e"/>
  <!-- Coat buttons -->
  <rect x="11" y="19" width="1" height="1" fill="#7cffa0"/>
  <rect x="11" y="22" width="1" height="1" fill="#7cffa0"/>
</svg>
